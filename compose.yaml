services:
  database:
    container_name: api-db
    image: "postgres:18.1-alpine"
    environment:
      POSTGRES_USER: api
      POSTGRES_PASSWORD: api
      POSTGRES_DB: api
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
